html, body {

inset: 0;
display: flex;
align-items: center;
justify-content: center;

}
#cx-loading.hidden {

}
/* скрываем bubble */
.woot-widget-bubble {
display: none !important;
opacity: 0 !important;
visibility: hidden !important;
pointer-events: none !important;
}
/* растягиваем чат на весь экран iframe */
.woot-widget-holder,
iframe.woot-widget-holder,
iframe#chatwoot_live_chat_widget,
iframe[src*="widget"],
iframe[src*="chatwoot"] {
position: fixed !important;
inset: 0 !important;
width: 100% !important;
height: 100% !important;
min-width: 100% !important;
min-height: 100% !important;
max-width: 100% !important;
max-height: 100% !important;

</style> </head> <body> <div id="cx-loading">Загрузка чата…</div> <script>
(function () {
  var BASE_URL = "https://app.chatwoot.com";
  var WEBSITE_TOKEN = "uKGnuqGozXxmjHuef98jr2ux";
  var isReady = false;

  function hideLoader() {
    var el = document.getElementById("cx-loading");
    if (el) el.classList.add("hidden");
  }

  function showError() {
    var el = document.getElementById("cx-loading");
    if (el) {
      el.innerHTML = "Если чат не открывается, это может быть связано с ограничениями сети. Попробуйте использовать другое подключение.";
    }
  }

  function forceFullSize() {
    var els = document.querySelectorAll(
      ".woot-widget-holder, iframe.woot-widget-holder, iframe#chatwoot_live_chat_widget, iframe[src*='widget'], iframe[src*='chatwoot']"
    );

    els.forEach(function (el) {
      el.style.position = "fixed";
      el.style.inset = "0";
      el.style.width = "100%";
      el.style.height = "100%";
      el.style.minWidth = "100%";
      el.style.minHeight = "100%";
      el.style.maxWidth = "100%";
      el.style.maxHeight = "100%";
      el.style.border = "0";
      el.style.borderRadius = "0";
      el.style.boxShadow = "none";
      el.style.margin = "0";
      el.style.padding = "0";
    });

    var bubble = document.querySelector(".woot-widget-bubble");
    if (bubble) {
      bubble.style.display = "none";
    }
  }

  window.addEventListener("chatwoot:ready", function () {
    isReady = true;

    setTimeout(function () {
      if (window.$chatwoot) {
        window.$chatwoot.toggle("open");
      }

      forceFullSize();
      hideLoader();
    }, 500);

    setTimeout(forceFullSize, 1200);
    setTimeout(forceFullSize, 2000);
    setTimeout(forceFullSize, 3000);
  });

  var g = document.createElement("script");
  g.src = BASE_URL + "/packs/js/sdk.js";
  g.async = true;

  g.onload = function () {
    window.chatwootSDK.run({
      websiteToken: WEBSITE_TOKEN,
      baseUrl: BASE_URL
    });
  };

  g.onerror = function () {
    showError();
  };

  document.body.appendChild(g);

  setTimeout(function () {
    if (!isReady) {
      showError();
    }
  }, 30000);
})();
</script> </body> </html> <!-- nominify end --> </div> </div> </div> </div> </div> <!--/allrecords--> <!-- Stat --> <script type="text/javascript">if(!window.mainTracker) {window.mainTracker='tilda';}
